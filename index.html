<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คลังภาพกิจกรรมโรงเรียน</title>
  <meta name="description" content="รวมอัลบั้มภาพกิจกรรมของโรงเรียน เปิดดูรูปได้ผ่าน Google Drive">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ส่วนหัว -->
  <header class="site-header">
    <div class="container">
      <div class="brand">
        <div class="brand-mark"><i class="ti ti-photo"></i></div>
        <div>
          <h1>คลังภาพกิจกรรมโรงเรียน</h1>
          <p id="brand-sub">รวมอัลบั้มภาพกิจกรรมทุกงาน</p>
        </div>
      </div>
      <a class="admin-link" href="admin.html"><i class="ti ti-lock"></i> ผู้ดูแล</a>
    </div>
  </header>

  <main class="container">

    <!-- แถบเครื่องมือ: ค้นหา + กรอง + สลับมุมมอง -->
    <section class="toolbar">
      <div class="search-box">
        <i class="ti ti-search icon"></i>
        <input type="search" id="search" placeholder="ค้นหากิจกรรม เช่น กีฬาสี วันไหว้ครู">
      </div>
      <div class="filter-row">
        <div class="chips" id="chips"></div>
        <select class="year-select" id="year-select">
          <option value="">ทุกปีการศึกษา</option>
        </select>
        <select class="year-select" id="sort-select" aria-label="เรียงลำดับ">
          <option value="date-desc">ใหม่สุดก่อน</option>
          <option value="date-asc">เก่าสุดก่อน</option>
          <option value="views-desc">ยอดวิวสูงสุด</option>
          <option value="name-asc">ตามชื่อ (ก-ฮ)</option>
        </select>
        <div class="view-toggle" role="tablist">
          <button id="btn-grid" class="active" role="tab" aria-selected="true">
            <i class="ti ti-layout-grid"></i> อัลบั้ม
          </button>
          <button id="btn-cal" role="tab" aria-selected="false">
            <i class="ti ti-calendar"></i> ปฏิทิน
          </button>
        </div>
      </div>
    </section>

    <!-- มุมมองอัลบั้ม (กริด) -->
    <section id="view-grid" aria-label="รายการอัลบั้ม">
      <div class="album-grid" id="album-grid"></div>
      <nav class="pagination" id="pagination" aria-label="แบ่งหน้า"></nav>
    </section>

    <!-- มุมมองปฏิทิน -->
    <section id="view-cal" class="calendar-wrap" hidden aria-label="ปฏิทินกิจกรรม">
      <div class="cal-head">
        <div class="cal-title" id="cal-title"></div>
        <div class="cal-nav">
          <button id="cal-prev" aria-label="เดือนก่อนหน้า"><i class="ti ti-chevron-left"></i></button>
          <button id="cal-today">วันนี้</button>
          <button id="cal-next" aria-label="เดือนถัดไป"><i class="ti ti-chevron-right"></i></button>
        </div>
      </div>
      <div class="cal-dow">
        <span>อา</span><span>จ</span><span>อ</span><span>พ</span><span>พฤ</span><span>ศ</span><span>ส</span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="day-panel" id="day-panel">
        <p class="hint">กดวันที่มีจุดสีเพื่อดูอัลบั้มของวันนั้น</p>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    คลังภาพกิจกรรมโรงเรียน · ภาพทั้งหมดจัดเก็บบน Google Drive
  </footer>

  <!-- ===== Lightbox ดูรูปในเว็บ ===== -->
  <div class="lightbox" id="lightbox" hidden>
    <button class="lb-close" id="lb-close" aria-label="ปิด"><i class="ti ti-x"></i></button>
    <button class="lb-nav lb-prev" id="lb-prev" aria-label="รูปก่อนหน้า"><i class="ti ti-chevron-left"></i></button>
    <figure class="lb-stage">
      <img id="lb-img" alt="">
      <figcaption id="lb-caption"></figcaption>
    </figure>
    <button class="lb-nav lb-next" id="lb-next" aria-label="รูปถัดไป"><i class="ti ti-chevron-right"></i></button>
    <a class="lb-drive btn" id="lb-drive" href="#" target="_blank" rel="noopener">
      <i class="ti ti-brand-google-drive"></i> ดูรูปทั้งหมดใน Google Drive
    </a>
  </div>

  <!-- ===== Modal แชร์อัลบั้ม ===== -->
  <div class="modal" id="share-modal" hidden>
    <div class="modal-box share-box" role="dialog" aria-modal="true" aria-labelledby="share-title">
      <div class="modal-head">
        <h3 id="share-title"><i class="ti ti-share"></i> แชร์อัลบั้ม</h3>
        <button class="modal-close" id="share-close" aria-label="ปิด"><i class="ti ti-x"></i></button>
      </div>
      <p class="share-name" id="share-name"></p>
      <div class="qr-wrap"><img id="share-qr" alt="QR code ของอัลบั้ม" width="180" height="180"></div>
      <div class="share-url-row">
        <input type="text" id="share-url" readonly>
        <button class="btn primary" id="share-copy"><i class="ti ti-copy"></i> คัดลอก</button>
      </div>
      <p class="share-hint">สแกน QR หรือคัดลอกลิงก์เพื่อส่งให้ผู้ปกครอง/นักเรียน</p>
    </div>
  </div>

  <div id="toast" role="status"></div>

  <script src="app.js"></script>
</body>
</html>
